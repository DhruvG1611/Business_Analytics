intent_patterns:

- pattern: How many films are in the catalog?
  metric: film_row_count
  dimensions: [film_film_id]

- pattern: most expensive film to replace
  metric: replacement_cost
  dimensions: [film_title]
  sort: desc
  limit: 1

- pattern: top 10 most expensive films
  metric: replacement_cost
  dimensions: [film_title]
  sort: desc
  limit: 10

- pattern: cheapest films to replace
  metric: replacement_cost
  dimensions: [film_title]
  sort: asc
  limit: 10

- pattern: What films does the store carry?
  metric: film_row_count
  dimensions: [film_film_id, film_title, film_rating, film_rental_rate]

- pattern: Which actors have appeared in the most films?
  metric: films_per_actor
  dimensions: [film_actor_actor_id, actor_first_name, actor_last_name]

- pattern: What are all the films this actor appeared in?
  metric: films_per_actor
  dimensions: [film_actor_actor_id, film_title]

- pattern: How many copies of this film do we have?
  metric: copies_per_film
  dimensions: [inventory_film_id, inventory_store_id]

- pattern: Is this film in stock at a given store?
  metric: copies_per_film_per_store
  dimensions: [inventory_film_id, inventory_store_id]
  procedure: inventory_in_stock / film_in_stock

- pattern: What films are currently rented out?
  metric: active_rental_count
  dimensions: [rental_inventory_id, rental_customer_id, rental_rental_date]

- pattern: Which rentals are overdue?
  metric: overdue_rental_count
  dimensions: [rental_rental_id, rental_customer_id, rental_rental_date, 
      film_rental_duration]

- pattern: How much revenue has the store made in total?
  metric: total_revenue
  dimensions: [payment_payment_date]

- pattern: Which store generates the most revenue?
  metric: revenue_by_store
  dimensions: [inventory_store_id]
  view: sales_by_store

- pattern: Which film category generates the most revenue?
  metric: revenue_by_category
  dimensions: [film_category_category_id, category_name]
  view: sales_by_film_category

- pattern: Who are our best customers last month?
  metric: top_customers_by_spend
  dimensions: [payment_customer_id, customer_first_name, customer_last_name]
  procedure: rewards_report

- pattern: What is this customer's current balance?
  metric: customer_balance
  dimensions: [payment_customer_id]
  function: get_customer_balance

- pattern: How many rentals has this customer made?
  metric: rentals_per_customer
  dimensions: [rental_customer_id]

- pattern: What is the most rented film?
  metric: rentals_per_film
  dimensions: [inventory_film_id, film_title]

- pattern: Which films are in the Action category?
  metric: films_per_category
  dimensions: [film_category_category_id, film_title, category_name]

- pattern: How many active customers do we have?
  metric: active_customer_count
  dimensions: [customer_active, customer_store_id]

- pattern: Which staff member has processed the most rentals?
  metric: rentals_per_staff
  dimensions: [rental_staff_id, staff_first_name, staff_last_name]

- pattern: What is the average rental duration?
  metric: average_rental_duration
  dimensions: [rental_rental_date, rental_return_date]

- pattern: What countries and cities are our customers from?
  metric: customer_row_count
  dimensions: [customer_address_id, address_city_id, city_country_id, 
      country_country]

- pattern: What is the total inventory across all stores?
  metric: inventory_row_count
  dimensions: [inventory_store_id, inventory_film_id]

- pattern: Find the films that are in inventory at store 1 but NOT at store 2
  metric: copies_per_film
  dimensions: [film_film_id, film_title]
  mode: set_difference

- pattern: Which films are available at store 2 but not store 1
  metric: copies_per_film
  dimensions: [film_film_id, film_title]
  mode: set_difference

- pattern: Titles in stock at store 1 excluding store 2
  metric: copies_per_film
  dimensions: [film_film_id, film_title]
  mode: set_difference

- pattern: Which films have an R or NC-17 rating?
  metric: film_row_count
  dimensions: [film_rating, film_title]

