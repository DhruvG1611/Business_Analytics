views:

  actor_info:
    description: >
      Lists all actors with the films they have appeared in, grouped by category.
      Joins actor, film, film_actor, film_category, and category tables.
    use_cases:
    - Show an actor's full filmography organized by genre
    - Find which genres an actor specializes in

  customer_list:
    description: >
      Combines customer first/last name into a full name and merges address, city,
      and country into a single readable record. Joins customer, address, city, country.
    use_cases:
    - Display customer directory with formatted names and locations
    - Export customer contact list

  film_list:
    description: >
      A formatted view of the film catalog including title, description, category,
      price, length, rating, and a comma-separated list of actors (in uppercase).
    use_cases:
    - Browse the full film catalog
    - Search films by category or actor

  nicer_but_slower_film_list:
    description: >
      Same as film_list but with actor names formatted in title case (first letter
      capitalized). Slower due to additional string processing.
    use_cases:
    - Customer-facing film catalog display
    - Print-ready film listings

  sales_by_film_category:
    description: >
      Aggregates total rental revenue broken down by film category/genre.
      Note: because a film can belong to multiple categories, totals
      across categories should not be summed to get total revenue.
    use_cases:
    - Identify most profitable genres
    - Inform category-level purchasing decisions

  sales_by_store:
    description: >
      Aggregates total rental revenue broken down by store location.
      Returns store city, country, manager name, and total sales.
    use_cases:
    - Compare store performance
    - Monthly / yearly store revenue reports

  staff_list:
    description: >
      Lists all staff members with their full name, address, city, country, and
      assigned store ID. Joins staff, address, city, country tables.
    use_cases:
    - HR staff directory
    - Identify store staffing

# ============================================================
# STORED PROCEDURES & FUNCTIONS REFERENCE
# ============================================================

stored_procedures:

  film_in_stock:
    description: >
      Returns a result set of inventory IDs for all copies of a given film
      that are currently in stock (not rented out) at a given store.
      Also returns a count via OUT parameter p_film_count.
    parameters:
      p_film_id: ID of the film to check (from film.film_id)
      p_store_id: ID of the store to check (from store.store_id)
      p_film_count: OUT — number of copies in stock

  film_not_in_stock:
    description: >
      Returns a result set of inventory IDs for all copies of a given film
      that are currently rented out (not in stock) at a given store.
      Also returns a count via OUT parameter p_film_count.
    parameters:
      p_film_id: ID of the film to check
      p_store_id: ID of the store to check
      p_film_count: OUT — number of copies not in stock

  rewards_report:
    description: >
      Identifies customers who qualify for a loyalty reward based on a minimum
      number of rentals and minimum spend in the previous calendar month.
      Returns qualifying customers and a count via count_rewardees.
    parameters:
      min_monthly_purchases: Minimum number of purchases to qualify
      min_dollar_amount_purchased: Minimum spend in USD to qualify
      count_rewardees: OUT — number of qualifying customers

stored_functions:

  get_customer_balance:
    description: >
      Returns the current outstanding balance on a customer's account as of
      a specified date. Accounts for all rentals and payments up to that date.
    parameters:
      p_customer_id: The customer's ID
      p_effective_date: The cutoff date for calculating the balance
    returns: DECIMAL — amount owing in USD

  inventory_held_by_customer:
    description: >
      Returns the customer_id of the customer who currently has a given
      inventory item rented out, or NULL if the item is in stock.
    parameters:
      p_inventory_id: The inventory item's ID
    returns: SMALLINT (customer_id) or NULL

  inventory_in_stock:
    description: >
      Returns a boolean indicating whether a given inventory item is
      currently available to rent (TRUE = in stock, FALSE = rented out).
    parameters:
      p_inventory_id: The inventory item's ID
    returns: BOOLEAN (1 = in stock, 0 = rented out)

# ============================================================
# TRIGGERS REFERENCE
# ============================================================

triggers:

  customer_create_date:
    table: customer
    event: INSERT
    description: Automatically sets customer.create_date to NOW() on every new 
      customer insert.

  payment_date:
    table: payment
    event: INSERT
    description: Automatically sets payment.payment_date to NOW() on every new 
      payment insert.

  rental_date:
    table: rental
    event: INSERT
    description: Automatically sets rental.rental_date to NOW() on every new 
      rental insert.

  ins_film:
    table: film
    event: INSERT
    description: Mirrors every INSERT on the film table to the film_text 
      full-text search table.

  upd_film:
    table: film
    event: UPDATE
    description: Mirrors every UPDATE on the film table to the film_text 
      full-text search table.

  del_film:
    table: film
    event: DELETE
    description: Mirrors every DELETE on the film table to the film_text 
      full-text search table.

# ============================================================
# PII & SENSITIVE FIELDS
# ============================================================

pii_fields:
- table: customer
  column: email
  sensitivity: medium
  notes: Customer email address; use for transactional communications only.
- table: customer
  column: first_name
  sensitivity: low
- table: customer
  column: last_name
  sensitivity: low
- table: staff
  column: email
  sensitivity: medium
- table: staff
  column: password
  sensitivity: high
  notes: Stored as SHA1 hash. Never expose or log in plain text.
- table: staff
  column: picture
  sensitivity: medium
  notes: Contains biometric photo data.
- table: address
  column: phone
  sensitivity: medium
  notes: Phone number linked to customers, staff, and stores.
