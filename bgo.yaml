# ============================================================
# Sakila DVD Rental Store — Business Glossary & Ontology
# Database: MySQL Sakila Sample Database (v1.1)
# Domain:   DVD Rental / Video Store Operations
# Tables:   16 base tables | 7 views | 3 procedures | 3 functions
# ============================================================

metadata:
  database: sakila
  domain: DVD Rental Store
  description: >
    The Sakila database models a DVD rental store business. It captures
    the full lifecycle of a rental transaction — from film catalog management,
    inventory tracking, customer registration, and staff operations, through
    to rental checkout, return processing, and payment collection.
    It also covers geographic data for customers, staff, and store locations.
  version: "1.1"
  tables:
  - actor
  - address
  - category
  - city
  - country
  - customer
  - film
  - film_actor
  - film_category
  - film_text
  - inventory
  - language
  - payment
  - rental
  - staff
  - store
  views:
  - actor_info
  - customer_list
  - film_list
  - nicer_but_slower_film_list
  - sales_by_film_category
  - sales_by_store
  - staff_list
  stored_procedures:
  - film_in_stock
  - film_not_in_stock
  - rewards_report
  stored_functions:
  - get_customer_balance
  - inventory_held_by_customer
  - inventory_in_stock

# ============================================================
# ONTOLOGY — Entities, Relationships & Business Rules
# ============================================================

ontology:

  entities:

    actor:
      description: >
        A person who performs in one or more films in the catalog. Actors are
        linked to films through the film_actor junction table, enabling a
        many-to-many relationship. Actor names are stored in uppercase.
      synonyms:
      - Actor
      - Performer
      - Cast member
      - Talent
      primary_key: actor_id
      business_rules:
      - An actor can appear in zero or more films.
      - A film can have zero or more actors.
      - Actor names are stored separately as first_name and last_name.

    address:
      description: >
        A physical address used by customers, staff members, and stores.
        Addresses are shared across all three entities via foreign key references.
        Each address links to a city, which in turn links to a country.
      synonyms:
      - Address
      - Location
      - Mailing address
      - Physical address
      primary_key: address_id
      business_rules:
      - Every customer, staff member, and store must have exactly one address.
      - An address belongs to exactly one city.
      - address2 is optional and may be NULL.
      - postal_code may be NULL where not applicable.

    category:
      description: >
        A genre or classification label that can be assigned to films. Categories
        allow films to be browsed and filtered by genre (e.g., Action, Comedy,
        Drama). A film may belong to multiple categories.
      synonyms:
      - Category
      - Genre
      - Film type
      - Classification
      primary_key: category_id
      business_rules:
      - A category can be assigned to zero or more films.
      - A film can belong to one or more categories.

    city:
      description: >
        A city within a country used to geo-locate addresses. Part of the
        three-level geographic hierarchy: country → city → address.
      synonyms:
      - City
      - Town
      - Municipality
      - Urban area
      primary_key: city_id
      business_rules:
      - Every city belongs to exactly one country.
      - A city can be referenced by multiple addresses.

    country:
      description: >
        The top-level geographic entity representing a nation. Countries contain
        cities, which in turn contain addresses linked to customers, staff, and stores.
      synonyms:
      - Country
      - Nation
      - Territory
      primary_key: country_id
      business_rules:
      - A country can contain zero or more cities.
      - Country is the top-level node in the geographic hierarchy.

    customer:
      description: >
        A person who registers with the store and rents films. Each customer is
        associated with a home store, a billing address, and a history of rentals
        and payments. Inactive customers are flagged rather than deleted.
      synonyms:
      - Customer
      - Member
      - Renter
      - Account holder
      - Patron
      primary_key: customer_id
      business_rules:
      - A customer must have a home store (store_id), but may rent from any 
        store.
      - Inactive customers (active = FALSE) should be excluded from most 
        queries.
      - A customer must have exactly one address.
      - create_date is set automatically by the customer_create_date trigger on 
        INSERT.
      - A customer can have zero or more rentals and payments.

    film:
      description: >
        A movie title in the store's catalog. The film table describes the title,
        language, rental terms (duration and rate), replacement cost, MPAA rating,
        and special features. The actual physical copies are tracked in inventory.
      synonyms:
      - Film
      - Movie
      - Title
      - DVD
      - Release
      primary_key: film_id
      business_rules:
      - A film must have a primary language (language_id is NOT NULL).
      - original_language_id is used for dubbed films and may be NULL.
      - rental_duration is specified in days.
      - rental_rate is the cost per rental period in USD.
      - replacement_cost is charged when a film is lost or returned damaged.
      - rating must be one of G, PG, PG-13, R, NC-17.
      - special_features may include Trailers, Commentaries, Deleted Scenes, 
        Behind the Scenes.
      - A film may have zero or more inventory copies across all stores.

    film_actor:
      description: >
        A junction/bridge table that resolves the many-to-many relationship between
        films and actors. Each row represents one actor's participation in one film.
      synonyms:
      - Film-actor association
      - Cast entry
      - Actor-film link
      primary_key: [actor_id, film_id]
      business_rules:
      - Each combination of actor_id and film_id must be unique.
      - Deleting an actor or film cascades to this table.

    film_category:
      description: >
        A junction/bridge table that resolves the many-to-many relationship between
        films and categories. Each row assigns one category to one film.
      synonyms:
      - Film-category association
      - Genre assignment
      - Category tag
      primary_key: [film_id, category_id]
      business_rules:
      - A film can be assigned to multiple categories.
      - Each film-category combination must be unique.

    film_text:
      description: >
        A full-text search mirror of the film table's title and description columns.
        Kept in sync with the film table via INSERT, UPDATE, and DELETE triggers
        (ins_film, upd_film, del_film). Do not modify this table directly.
      synonyms:
      - Film search index
      - Full-text film data
      - Film text index
      primary_key: film_id
      business_rules:
      - Contents must never be modified directly; all changes go through the 
        film table.
      - Automatically synchronized via database triggers.

    inventory:
      description: >
        Represents a single physical copy (disc) of a film held at a specific store.
        Multiple inventory rows for the same film_id and store_id indicate multiple
        copies of that film at that store. Inventory is rented out to customers.
      synonyms:
      - Inventory item
      - Physical copy
      - Disc copy
      - Stock item
      - DVD copy
      primary_key: inventory_id
      business_rules:
      - Each inventory row is a unique physical copy of a film at a specific 
        store.
      - An inventory item can only be rented to one customer at a time.
      - An item is considered "in stock" when no active (unreturned) rental 
        exists for it.

    language:
      description: >
        A lookup table of languages used to identify the spoken language of a film,
        or the original language before dubbing. Referenced by film.language_id
        and film.original_language_id.
      synonyms:
      - Language
      - Spoken language
      - Audio language
      - Dub language
      primary_key: language_id
      business_rules:
      - Every film must have a language (language_id is NOT NULL).
      - original_language_id is only populated for dubbed films.

    payment:
      description: >
        Records a monetary payment made by a customer. Payments are typically
        linked to a rental but can also represent outstanding fee settlements.
        Processed by a staff member at time of transaction.
      synonyms:
      - Payment
      - Transaction
      - Charge
      - Fee
      - Invoice
      primary_key: payment_id
      business_rules:
      - A payment must reference a customer and a staff member.
      - rental_id may be NULL for payments covering outstanding balances not 
        tied to a specific rental.
      - payment_date is set automatically by the payment_date trigger on INSERT.
      - amount represents the dollar value of the payment.

    rental:
      description: >
        Records a single rental event: one customer renting one inventory item (DVD
        copy)
        on a given date, processed by a staff member. The row is updated when the
        item
        is returned. Open rentals (return_date IS NULL) indicate items still checked
        out.
      synonyms:
      - Rental
      - Checkout
      - Borrowing
      - Transaction
      - Loan
      primary_key: rental_id
      business_rules:
      - rental_date is set automatically by the rental_date trigger on INSERT.
      - return_date is NULL until the item is returned.
      - An inventory item cannot be rented to two customers simultaneously.
      - Overdue rentals are those where rental_date + rental_duration days < 
        TODAY() and return_date IS NULL.
      - A rental may have zero or one associated payment.

    staff:
      description: >
        An employee of the rental store. Staff members process rentals and payments,
        and one staff member per store serves as the store manager. Inactive staff
        are flagged rather than deleted.
      synonyms:
      - Staff member
      - Employee
      - Associate
      - Clerk
      - Manager
      primary_key: staff_id
      business_rules:
      - Each staff member is assigned a home store.
      - active = FALSE marks a former employee; rows are not deleted.
      - Passwords must be stored as SHA1 hashes.
      - A staff member can process zero or more rentals and payments.
      - A staff member can be the manager of at most one store.

    store:
      description: >
        A physical retail location of the DVD rental chain. Each store has its own
        inventory, staff, and a designated manager. Customers and staff are assigned
        a home store, though transactions can occur across stores.
      synonyms:
      - Store
      - Branch
      - Location
      - Outlet
      - Shop
      primary_key: store_id
      business_rules:
      - Each store must have exactly one manager (manager_staff_id).
      - Each store must have exactly one address.
      - Inventory, staff, and customers are linked to specific stores.

  relationships:

  - statement: An actor appears in zero or more films.
    from: actor
    to: film
    via: film_actor
    cardinality: many_to_many
    natural_language:
    - Which films does this actor appear in?
    - How many films has this actor starred in?
    - Who are the actors in this film?

  - statement: A film belongs to one or more categories.
    from: film
    to: category
    via: film_category
    cardinality: many_to_many
    natural_language:
    - What genre is this film?
    - Which films are in the Action category?
    - How many categories does this film belong to?

  - statement: A film has one primary language and optionally one original 
      language.
    from: film
    to: language
    cardinality: many_to_one
    natural_language:
    - What language is this film in?
    - Which films are in French?

  - statement: An inventory item is one physical copy of a film at a specific 
      store.
    from: inventory
    to: film
    cardinality: many_to_one
    natural_language:
    - How many copies of this film does the store have?
    - Which store stocks this film?

  - statement: A rental links one customer to one inventory item processed by 
      one staff member.
    from: rental
    to: [inventory, customer, staff]
    cardinality: many_to_one
    natural_language:
    - Who rented this item?
    - What did this customer rent?
    - When was this item last rented?
    - Is this inventory item currently checked out?

  - statement: A payment is made by a customer, processed by a staff member, and
      may be tied to a rental.
    from: payment
    to: [customer, staff, rental]
    cardinality: many_to_one
    natural_language:
    - How much has this customer paid?
    - What is this customer's outstanding balance?
    - Which staff member processed this payment?

  - statement: A customer belongs to a home store and has one address.
    from: customer
    to: [store, address]
    cardinality: many_to_one
    natural_language:
    - Which store does this customer belong to?
    - Where does this customer live?

  - statement: A staff member is assigned to a home store and has one address.
    from: staff
    to: [store, address]
    cardinality: many_to_one
    natural_language:
    - Which store does this staff member work at?
    - Who manages this store?

  - statement: A store has one manager (staff member) and one address.
    from: store
    to: [staff, address]
    cardinality: one_to_one
    natural_language:
    - Who manages this store?
    - Where is this store located?

  - statement: An address belongs to one city; a city belongs to one country.
    from: address
    to: city
    cardinality: many_to_one
    natural_language:
    - What city is this address in?
    - What country is this customer from?
    - Which customers are in Canada?

# ============================================================
# DIMENSIONS — Column-level Business Glossary
# ============================================================

dimensions:

  # --- ACTOR ---
  actor_actor_id:
    label: Actor ID
    synonyms: [Actor identifier, Actor key, Performer ID]
    description: Surrogate primary key that uniquely identifies each actor.
    data_type: SMALLINT UNSIGNED
    nullable: false

  actor_first_name:
    label: Actor first name
    synonyms: [First name, Given name, Actor given name]
    description: The first (given) name of the actor. Stored in uppercase.
    data_type: VARCHAR(45)
    nullable: false

  actor_last_name:
    label: Actor last name
    synonyms: [Last name, Surname, Actor surname, Family name]
    description: The last (family) name of the actor. Stored in uppercase. 
      Indexed for fast lookup.
    data_type: VARCHAR(45)
    nullable: false

  actor_last_update:
    label: Actor last updated
    synonyms: [Last updated, Last modified, Row timestamp]
    description: Timestamp of when this actor row was created or last modified.
    data_type: TIMESTAMP
    nullable: false

  # --- ADDRESS ---
  address_address_id:
    label: Address ID
    synonyms: [Address identifier, Address key]
    description: Surrogate primary key that uniquely identifies each address 
      record.
    data_type: SMALLINT UNSIGNED
    nullable: false

  address_address:
    label: Street address (line 1)
    synonyms: [Address line 1, Street, Street address]
    description: The first line of the address (street number and name).
    data_type: VARCHAR(50)
    nullable: false

  address_address2:
    label: Street address (line 2)
    synonyms: [Address line 2, Apartment, Suite, Unit]
    description: An optional second line of the address (e.g. apartment or suite
      number).
    data_type: VARCHAR(50)
    nullable: true

  address_district:
    label: District / Region
    synonyms: [District, State, Province, Prefecture, Region]
    description: The sub-national region of the address (state, province, 
      prefecture, etc.).
    data_type: VARCHAR(20)
    nullable: false

  address_city_id:
    label: City ID (FK)
    synonyms: [City identifier, City key]
    description: Foreign key referencing the city this address is located in.
    data_type: SMALLINT UNSIGNED
    nullable: false

  address_postal_code:
    label: Postal / ZIP code
    synonyms: [Postal code, ZIP code, Post code]
    description: The postal or ZIP code of the address. May be NULL where not 
      applicable.
    data_type: VARCHAR(10)
    nullable: true

  address_phone:
    label: Phone number
    synonyms: [Telephone, Contact number, Phone]
    description: The telephone number associated with this address.
    data_type: VARCHAR(20)
    nullable: false

  address_location:
    label: Geospatial location
    synonyms: [GPS coordinates, Geometry, Lat/long, Spatial location]
    description: >
      A spatial GEOMETRY column storing the geographic coordinates of the address.
      Only present on MySQL 5.7.5+. Used for proximity-based queries.
    data_type: GEOMETRY
    nullable: true

  address_last_update:
    label: Address last updated
    synonyms: [Last updated, Last modified]
    description: Timestamp of when this address row was created or last 
      modified.
    data_type: TIMESTAMP
    nullable: false

  # --- CATEGORY ---
  category_category_id:
    label: Category ID
    synonyms: [Category identifier, Genre ID, Category key]
    description: Surrogate primary key that uniquely identifies each film 
      category.
    data_type: TINYINT UNSIGNED
    nullable: false

  category_name:
    label: Category name
    synonyms: [Genre name, Category label, Film genre]
    description: >
      The name of the genre/category. Known values include: Action, Animation,
      Children, Classics, Comedy, Documentary, Drama, Family, Foreign, Games,
      Horror, Music, New, Sci-Fi, Sports, Travel.
    data_type: VARCHAR(25)
    nullable: false

  category_last_update:
    label: Category last updated
    synonyms: [Last updated, Last modified]
    description: Timestamp of when this category row was created or last 
      modified.
    data_type: TIMESTAMP
    nullable: false

  # --- CITY ---
  city_city_id:
    label: City ID
    synonyms: [City identifier, City key]
    description: Surrogate primary key that uniquely identifies each city.
    data_type: SMALLINT UNSIGNED
    nullable: false

  city_city:
    label: City name
    synonyms: [City, Town, Municipality]
    description: The name of the city.
    data_type: VARCHAR(50)
    nullable: false

  city_country_id:
    label: Country ID (FK)
    synonyms: [Country identifier, Country key]
    description: Foreign key referencing the country this city belongs to.
    data_type: SMALLINT UNSIGNED
    nullable: false

  city_last_update:
    label: City last updated
    synonyms: [Last updated, Last modified]
    description: Timestamp of when this city row was created or last modified.
    data_type: TIMESTAMP
    nullable: false

  # --- COUNTRY ---
  country_country_id:
    label: Country ID
    synonyms: [Country identifier, Country key]
    description: Surrogate primary key that uniquely identifies each country.
    data_type: SMALLINT UNSIGNED
    nullable: false

  country_country:
    label: Country name
    synonyms: [Country, Nation, Territory]
    description: The English name of the country.
    data_type: VARCHAR(50)
    nullable: false

  country_last_update:
    label: Country last updated
    synonyms: [Last updated, Last modified]
    description: Timestamp of when this country row was created or last 
      modified.
    data_type: TIMESTAMP
    nullable: false

  # --- CUSTOMER ---
  customer_customer_id:
    label: Customer ID
    synonyms: [Customer identifier, Member ID, Account ID, Customer key]
    description: Surrogate primary key that uniquely identifies each customer.
    data_type: SMALLINT UNSIGNED
    nullable: false

  customer_store_id:
    label: Home store ID (FK)
    synonyms: [Home store, Primary store, Store ID]
    description: >
      Foreign key identifying the customer's home store. Customers are not
      restricted to this store but typically shop here.
    data_type: TINYINT UNSIGNED
    nullable: false

  customer_first_name:
    label: Customer first name
    synonyms: [First name, Given name]
    description: The customer's first (given) name.
    data_type: VARCHAR(45)
    nullable: false

  customer_last_name:
    label: Customer last name
    synonyms: [Last name, Surname, Family name]
    description: The customer's last (family) name. Indexed for fast lookup.
    data_type: VARCHAR(45)
    nullable: false

  customer_email:
    label: Customer email address
    synonyms: [Email, Email address, Contact email]
    description: The customer's email address, used for contact and account 
      identification.
    data_type: VARCHAR(50)
    nullable: true

  customer_address_id:
    label: Customer address ID (FK)
    synonyms: [Address ID, Billing address]
    description: Foreign key referencing the customer's address in the address 
      table.
    data_type: SMALLINT UNSIGNED
    nullable: false

  customer_active:
    label: Customer active status
    synonyms: [Active, Active status, Account status, Is active]
    description: >
      Indicates whether the customer is currently active (1 = active, 0 = inactive).
      Inactive customers are soft-deleted; most queries should filter WHERE active
      = 1.
    data_type: BOOLEAN
    nullable: false
    domain_values:
      1: Active customer
      0: Inactive / soft-deleted customer

  customer_create_date:
    label: Customer creation date
    synonyms: [Registration date, Account creation date, Sign-up date, Join date]
    description: >
      The date the customer was added to the system. Set automatically
      by the customer_create_date trigger on INSERT.
    data_type: DATETIME
    nullable: false

  customer_last_update:
    label: Customer last updated
    synonyms: [Last updated, Last modified]
    description: Timestamp of when this customer row was created or last 
      modified.
    data_type: TIMESTAMP
    nullable: true

  # --- FILM ---
  film_film_id:
    label: Film ID
    synonyms: [Film identifier, Movie ID, Title ID, Film key]
    description: Surrogate primary key that uniquely identifies each film in the
      catalog.
    data_type: SMALLINT UNSIGNED
    nullable: false

  film_title:
    label: Film title
    synonyms: [Title, Movie title, Film name, Name]
    description: The title of the film. Full-text indexed via the film_text 
      table.
    data_type: VARCHAR(255)
    nullable: false

  film_description:
    label: Film description
    synonyms: [Description, Plot summary, Synopsis, Overview]
    description: >
      A short description or plot summary of the film. Full-text indexed
      via the film_text table. May be NULL.
    data_type: TEXT
    nullable: true

  film_release_year:
    label: Release year
    synonyms: [Year, Year of release, Publication year]
    description: The year the film was theatrically released.
    data_type: YEAR
    nullable: true

  film_language_id:
    label: Language ID (FK)
    synonyms: [Language, Audio language, Film language]
    description: Foreign key identifying the language the film is presented in.
    data_type: TINYINT UNSIGNED
    nullable: false

  film_original_language_id:
    label: Original language ID (FK)
    synonyms: [Original language, Source language, Pre-dub language]
    description: >
      Foreign key identifying the film's original language before dubbing.
      NULL when the film is in its original language.
    data_type: TINYINT UNSIGNED
    nullable: true

  film_rental_duration:
    label: Rental duration (days)
    synonyms: [Rental period, Loan period, Duration, Checkout period]
    description: >
      The standard rental period for this film, expressed in days.
      Used to calculate overdue returns.
    data_type: TINYINT UNSIGNED
    nullable: false
    unit: days

  film_rental_rate:
    label: Rental rate
    synonyms: [Price, Rental price, Daily rate, Cost to rent, Rental fee]
    description: >
      The cost in USD to rent this film for the standard rental_duration period.
    data_type: DECIMAL(4,2)
    nullable: false
    unit: USD

  film_length:
    label: Film length (minutes)
    synonyms: [Runtime, Duration, Running time, Length]
    description: The total runtime of the film in minutes.
    data_type: SMALLINT UNSIGNED
    nullable: true
    unit: minutes

  film_replacement_cost:
    label: Replacement cost
    synonyms: [Replacement value, Lost film charge, Damage fee, Liability cost]
    description: >
      The amount charged to the customer if the film is lost or returned
      in a damaged or unacceptable condition.
    data_type: DECIMAL(5,2)
    nullable: false
    unit: USD

  film_rating:
    label: MPAA rating
    synonyms: [Rating, Content rating, Age rating, Classification]
    description: The MPAA content rating assigned to the film.
    data_type: ENUM
    nullable: true
    domain_values:
      G: General audiences — all ages admitted
      PG: Parental guidance suggested
      PG-13: Parents strongly cautioned — some material may be inappropriate for
        children under 13
      R: Restricted — under 17 requires accompanying parent or guardian
      NC-17: No one 17 and under admitted

  film_special_features:
    label: Special features
    synonyms: [Extras, Bonus features, DVD extras]
    description: >
      A SET column listing bonus content included on the DVD. Possible values:
      Trailers, Commentaries, Deleted Scenes, Behind the Scenes.
    data_type: SET
    nullable: true
    domain_values:
      Trailers: Preview trailers for other films
      Commentaries: Director or cast audio commentary tracks
      "Deleted Scenes": Scenes removed from the final theatrical cut
      "Behind the Scenes": Behind-the-scenes production footage

  film_last_update:
    label: Film last updated
    synonyms: [Last updated, Last modified]
    description: Timestamp of when this film row was created or last modified.
    data_type: TIMESTAMP
    nullable: false

  # --- FILM_ACTOR ---
  film_actor_actor_id:
    label: Actor ID (FK)
    synonyms: [Actor, Performer]
    description: Foreign key identifying the actor in this film-actor 
      association.
    data_type: SMALLINT UNSIGNED
    nullable: false

  film_actor_film_id:
    label: Film ID (FK)
    synonyms: [Film, Movie, Title]
    description: Foreign key identifying the film in this film-actor 
      association.
    data_type: SMALLINT UNSIGNED
    nullable: false

  film_actor_last_update:
    label: Film-actor last updated
    synonyms: [Last updated]
    description: Timestamp of when this cast row was created or last modified.
    data_type: TIMESTAMP
    nullable: false

  # --- FILM_CATEGORY ---
  film_category_film_id:
    label: Film ID (FK)
    synonyms: [Film, Movie]
    description: Foreign key identifying the film in this film-category 
      association.
    data_type: SMALLINT UNSIGNED
    nullable: false

  film_category_category_id:
    label: Category ID (FK)
    synonyms: [Category, Genre]
    description: Foreign key identifying the category assigned to the film.
    data_type: TINYINT UNSIGNED
    nullable: false

  film_category_last_update:
    label: Film-category last updated
    synonyms: [Last updated]
    description: Timestamp of when this category assignment was created or last 
      modified.
    data_type: TIMESTAMP
    nullable: false

  # --- INVENTORY ---
  inventory_inventory_id:
    label: Inventory ID
    synonyms: [Copy ID, Inventory item, Stock ID, Disc ID]
    description: Surrogate primary key uniquely identifying each physical copy 
      of a film.
    data_type: MEDIUMINT UNSIGNED
    nullable: false

  inventory_film_id:
    label: Film ID (FK)
    synonyms: [Film, Movie, Title]
    description: Foreign key identifying which film this physical copy 
      represents.
    data_type: SMALLINT UNSIGNED
    nullable: false

  inventory_store_id:
    label: Store ID (FK)
    synonyms: [Store, Branch, Location]
    description: Foreign key identifying which store stocks this physical copy.
    data_type: TINYINT UNSIGNED
    nullable: false

  inventory_last_update:
    label: Inventory last updated
    synonyms: [Last updated, Last modified]
    description: Timestamp of when this inventory row was created or last 
      modified.
    data_type: TIMESTAMP
    nullable: false

  # --- LANGUAGE ---
  language_language_id:
    label: Language ID
    synonyms: [Language identifier, Language key]
    description: Surrogate primary key uniquely identifying each language.
    data_type: TINYINT UNSIGNED
    nullable: false

  language_name:
    label: Language name
    synonyms: [Language, Language label, Spoken language]
    description: The English name of the language (e.g., English, French, 
      Japanese).
    data_type: CHAR(20)
    nullable: false

  language_last_update:
    label: Language last updated
    synonyms: [Last updated]
    description: Timestamp of when this language row was created or last 
      modified.
    data_type: TIMESTAMP
    nullable: false

  # --- PAYMENT ---
  payment_payment_id:
    label: Payment ID
    synonyms: [Payment identifier, Transaction ID, Receipt ID]
    description: Surrogate primary key uniquely identifying each payment record.
    data_type: SMALLINT UNSIGNED
    nullable: false

  payment_customer_id:
    label: Customer ID (FK)
    synonyms: [Customer, Payer, Member]
    description: Foreign key identifying the customer who made this payment.
    data_type: SMALLINT UNSIGNED
    nullable: false

  payment_staff_id:
    label: Staff ID (FK)
    synonyms: [Staff member, Cashier, Processed by]
    description: Foreign key identifying the staff member who processed this 
      payment.
    data_type: TINYINT UNSIGNED
    nullable: false

  payment_rental_id:
    label: Rental ID (FK)
    synonyms: [Rental, Associated rental, Rental reference]
    description: >
      Foreign key identifying the rental this payment covers. May be NULL
      when the payment settles an outstanding balance not tied to a specific rental.
    data_type: INT
    nullable: true

  payment_amount:
    label: Payment amount
    synonyms: [Amount, Value, Charge, Fee, Total paid]
    description: The dollar amount of this payment.
    data_type: DECIMAL(5,2)
    nullable: false
    unit: USD

  payment_payment_date:
    label: Payment date
    synonyms: [Date paid, Transaction date, Payment timestamp]
    description: >
      The date and time the payment was processed. Set automatically
      by the payment_date trigger on INSERT.
    data_type: DATETIME
    nullable: false

  payment_last_update:
    label: Payment last updated
    synonyms: [Last updated]
    description: Timestamp of when this payment row was created or last 
      modified.
    data_type: TIMESTAMP
    nullable: true

  # --- RENTAL ---
  rental_rental_id:
    label: Rental ID
    synonyms: [Rental identifier, Transaction ID, Checkout ID, Loan ID]
    description: Surrogate primary key uniquely identifying each rental 
      transaction.
    data_type: INT
    nullable: false

  rental_rental_date:
    label: Rental date
    synonyms: [Checkout date, Rental timestamp, Date rented, Start date]
    description: >
      The date and time the inventory item was checked out. Set automatically
      by the rental_date trigger on INSERT.
    data_type: DATETIME
    nullable: false

  rental_inventory_id:
    label: Inventory ID (FK)
    synonyms: [Copy, Inventory item, DVD copy, Physical copy]
    description: Foreign key identifying the specific physical copy that was 
      rented.
    data_type: MEDIUMINT UNSIGNED
    nullable: false

  rental_customer_id:
    label: Customer ID (FK)
    synonyms: [Customer, Renter, Borrower, Member]
    description: Foreign key identifying the customer who rented the item.
    data_type: SMALLINT UNSIGNED
    nullable: false

  rental_return_date:
    label: Return date
    synonyms: [Date returned, Return timestamp, End date, Returned on]
    description: >
      The date and time the item was returned. NULL if the item has not yet
      been returned. A NULL value indicates an active (open) rental.
    data_type: DATETIME
    nullable: true

  rental_staff_id:
    label: Staff ID (FK)
    synonyms: [Staff member, Processed by, Clerk]
    description: Foreign key identifying the staff member who processed the 
      rental checkout.
    data_type: TINYINT UNSIGNED
    nullable: false

  rental_last_update:
    label: Rental last updated
    synonyms: [Last updated]
    description: Timestamp of when this rental row was created or last modified.
    data_type: TIMESTAMP
    nullable: false

  # --- STAFF ---
  staff_staff_id:
    label: Staff ID
    synonyms: [Staff identifier, Employee ID, Staff key]
    description: Surrogate primary key uniquely identifying each staff member.
    data_type: TINYINT UNSIGNED
    nullable: false

  staff_first_name:
    label: Staff first name
    synonyms: [First name, Given name]
    description: The staff member's first (given) name.
    data_type: VARCHAR(45)
    nullable: false

  staff_last_name:
    label: Staff last name
    synonyms: [Last name, Surname]
    description: The staff member's last (family) name.
    data_type: VARCHAR(45)
    nullable: false

  staff_address_id:
    label: Staff address ID (FK)
    synonyms: [Address, Home address]
    description: Foreign key identifying the staff member's address.
    data_type: SMALLINT UNSIGNED
    nullable: false

  staff_picture:
    label: Staff photo
    synonyms: [Photo, Picture, Headshot, Employee photo]
    description: A BLOB containing a photograph of the staff member. May be 
      NULL.
    data_type: BLOB
    nullable: true

  staff_email:
    label: Staff email address
    synonyms: [Email, Work email, Contact email]
    description: The staff member's email address.
    data_type: VARCHAR(50)
    nullable: true

  staff_store_id:
    label: Home store ID (FK)
    synonyms: [Home store, Primary store, Assigned store]
    description: Foreign key identifying the staff member's assigned home store.
    data_type: TINYINT UNSIGNED
    nullable: false

  staff_active:
    label: Staff active status
    synonyms: [Active, Employment status, Is active]
    description: >
      Indicates whether the staff member is currently employed (1 = active, 0 = inactive).
      Former employees are soft-deleted by setting this to 0.
    data_type: BOOLEAN
    nullable: false
    domain_values:
      1: Currently employed
      0: Former employee (soft-deleted)

  staff_username:
    label: System username
    synonyms: [Username, Login name, User ID, System login]
    description: The username used by the staff member to log into the rental 
      system.
    data_type: VARCHAR(16)
    nullable: false

  staff_password:
    label: System password
    synonyms: [Password, Login password]
    description: >
      The hashed password used to authenticate the staff member.
      Must be stored as a SHA1 hash. Never stored in plain text.
    data_type: VARCHAR(40)
    nullable: true
    pii: true

  staff_last_update:
    label: Staff last updated
    synonyms: [Last updated]
    description: Timestamp of when this staff row was created or last modified.
    data_type: TIMESTAMP
    nullable: false

  # --- STORE ---
  store_store_id:
    label: Store ID
    synonyms: [Store identifier, Branch ID, Location ID, Store key]
    description: Surrogate primary key uniquely identifying each store.
    data_type: TINYINT UNSIGNED
    nullable: false

  store_manager_staff_id:
    label: Manager staff ID (FK)
    synonyms: [Manager, Store manager, Branch manager]
    description: Foreign key identifying the staff member who manages this 
      store.
    data_type: TINYINT UNSIGNED
    nullable: false

  store_address_id:
    label: Store address ID (FK)
    synonyms: [Store address, Branch address, Location address]
    description: Foreign key identifying the physical address of this store.
    data_type: SMALLINT UNSIGNED
    nullable: false

  store_last_update:
    label: Store last updated
    synonyms: [Last updated]
    description: Timestamp of when this store row was created or last modified.
    data_type: TIMESTAMP
    nullable: false

# ============================================================
# METRICS — Aggregatable Business Measures
# ============================================================

metrics:

  # --- Row counts ---
  actor_row_count:
    label: Total actors
    synonyms: [Actor count, Number of actors, How many actors, Total performers]
    description: Total number of distinct actors in the catalog.
    calculation: COUNT(*) FROM actor

  film_row_count:
    label: Total films
    synonyms: [Film count, Number of films, Catalog size, How many titles, Total
        titles]
    description: Total number of distinct films in the catalog.
    calculation: COUNT(*) FROM film

  inventory_row_count:
    label: Total inventory copies
    synonyms: [Total copies, Inventory count, Stock count, Total discs]
    description: Total number of physical DVD copies across all stores.
    calculation: COUNT(*) FROM inventory

  customer_row_count:
    label: Total customers
    synonyms: [Customer count, Member count, Number of customers, How many 
        customers]
    description: Total number of registered customers (active and inactive).
    calculation: COUNT(*) FROM customer

  active_customer_count:
    label: Active customers
    synonyms: [Active members, Active accounts, Current customers]
    description: Number of currently active customers.
    calculation: COUNT(*) FROM customer WHERE active = 1

  staff_row_count:
    label: Total staff
    synonyms: [Staff count, Employee count, Number of employees]
    description: Total number of staff members (active and inactive).
    calculation: COUNT(*) FROM staff

  store_row_count:
    label: Total stores
    synonyms: [Store count, Number of stores, Branch count, Number of locations]
    description: Total number of store locations.
    calculation: COUNT(*) FROM store

  rental_row_count:
    label: Total rentals
    synonyms: [Rental count, Number of rentals, Transaction count, Total 
        checkouts]
    description: Total number of rental transactions ever recorded.
    calculation: COUNT(*) FROM rental

  active_rental_count:
    label: Open / active rentals
    synonyms: [Open rentals, Current checkouts, Items currently rented out, 
        Unreturned rentals]
    description: Number of rentals where the item has not yet been returned.
    calculation: COUNT(*) FROM rental WHERE return_date IS NULL

  overdue_rental_count:
    label: Overdue rentals
    synonyms: [Late returns, Overdue items, Past-due rentals]
    description: Number of rentals that are past their due date and not yet 
      returned.
    calculation: >
      COUNT(*) FROM rental r
      JOIN inventory i ON r.inventory_id = i.inventory_id
      JOIN film f ON i.film_id = f.film_id
      WHERE r.return_date IS NULL
      AND DATE_ADD(r.rental_date, INTERVAL f.rental_duration DAY) < CURRENT_DATE()

  payment_row_count:
    label: Total payments
    synonyms: [Payment count, Number of transactions, Transaction volume]
    description: Total number of payment transactions recorded.
    calculation: COUNT(*) FROM payment

  category_row_count:
    label: Total categories
    synonyms: [Genre count, Number of categories, Number of genres]
    description: Total number of distinct film categories/genres.
    calculation: COUNT(*) FROM category

  language_row_count:
    label: Total languages
    synonyms: [Language count, Number of languages]
    description: Total number of languages in the lookup table.
    calculation: COUNT(*) FROM language

  # --- Revenue metrics ---
  total_revenue:
    label: Total revenue
    synonyms: [Total sales, Revenue, Gross revenue, Total income, Total 
        collected]
    description: Sum of all payment amounts across all transactions and stores.
    calculation: SUM(amount) FROM payment
    unit: USD

  revenue_by_store:
    label: Revenue By Store
    synonyms:
    - Revenue By Store
    - total revenue_by_store
    - revenue_by_store summary
    description: Revenue By Store
    calculation: SUM(payment.amount)
  revenue_by_category:
    label: Revenue By Category
    synonyms:
    - Revenue By Category
    - total revenue_by_category
    - revenue_by_category summary
    description: Revenue By Category
    calculation: SUM(payment.amount)
  average_payment_amount:
    label: Average payment amount
    synonyms: [Avg payment, Mean transaction value, Average transaction]
    description: The average dollar value of a single payment transaction.
    calculation: AVG(amount) FROM payment
    unit: USD

  customer_lifetime_value:
    label: Customer lifetime value
    synonyms: [CLV, LTV, Total customer spend, Customer total spend]
    description: Total amount a specific customer has paid across all their 
      transactions.
    calculation: SUM(amount) FROM payment WHERE customer_id = ?
    unit: USD

  customer_balance:
    label: Customer balance
    synonyms: [Outstanding balance, Amount owed, Current balance, Account 
        balance]
    description: >
      The current amount owed by a customer. Computed by the get_customer_balance
      stored function, which factors in rentals and payments up to a given date.
    calculation: get_customer_balance(customer_id, NOW())
    unit: USD

  # --- Inventory metrics ---
  copies_per_film:
    label: Copies per film
    synonyms: [Inventory depth, Stock per title, How many copies of a film]
    description: Number of physical copies of a given film across all stores.
    calculation: COUNT(*) FROM inventory WHERE film_id = ? GROUP BY film_id

  copies_per_film_per_store:
    label: Copies per film per store
    synonyms: [Store inventory per title, In-store stock]
    description: Number of physical copies of a given film at a specific store.
    calculation: COUNT(*) FROM inventory WHERE film_id = ? AND store_id = ?

  films_in_stock:
    label: Films in stock
    synonyms: [Available films, Films available to rent, In-stock titles]
    description: Number of distinct film titles currently available (at least 
      one copy not rented out).
    calculation: Uses inventory_in_stock() function per inventory item

  # --- Activity metrics ---
  rentals_per_customer:
    label: Rentals per customer
    synonyms: [Customer rental frequency, Rentals by customer, Customer activity]
    description: Total number of rentals made by a specific customer.
    calculation: COUNT(*) FROM rental WHERE customer_id = ?

  rentals_per_film:
    label: Rentals per film
    synonyms: [Film popularity, Times rented, Rental demand, Film demand]
    description: Total number of times a specific film has been rented.
    calculation: COUNT(*) FROM rental r JOIN inventory i ON r.inventory_id = 
      i.inventory_id WHERE i.film_id = ?

  rentals_per_store:
    label: Rentals per store
    synonyms: [Store activity, Store rental volume, Branch rental count]
    description: Total number of rentals processed at a specific store.
    calculation: COUNT(*) FROM rental r JOIN inventory i ON r.inventory_id = 
      i.inventory_id WHERE i.store_id = ?

  films_per_actor:
    label: Films per actor
    synonyms: [Actor filmography size, How many films an actor appeared in]
    description: Number of films a given actor has appeared in.
    calculation: COUNT(*) FROM film_actor WHERE actor_id = ?

  actors_per_film:
    label: Actors per film
    synonyms: [Cast size, Number of actors in a film]
    description: Number of actors credited in a given film.
    calculation: COUNT(*) FROM film_actor WHERE film_id = ?

  films_per_category:
    label: Films per category
    synonyms: [Titles per genre, Genre catalog size, Category size]
    description: Number of films assigned to a given category.
    calculation: COUNT(*) FROM film_category WHERE category_id = ?

  rentals_per_staff:
    label: Rentals processed per staff member
    synonyms: [Staff activity, Transactions per employee, Staff productivity]
    description: Number of rental transactions processed by a specific staff 
      member.
    calculation: COUNT(*) FROM rental WHERE staff_id = ?

  payments_per_staff:
    label: Payments processed per staff member
    synonyms: [Payment volume per staff, Staff payment activity]
    description: Number of payment transactions processed by a specific staff 
      member.
    calculation: COUNT(*) FROM payment WHERE staff_id = ?

  average_rental_duration:
    label: Average rental duration
    synonyms: [Avg loan period, Mean checkout duration, Average days rented]
    description: Average number of days between rental_date and return_date for 
      completed rentals.
    calculation: AVG(DATEDIFF(return_date, rental_date)) FROM rental WHERE 
      return_date IS NOT NULL
    unit: days

  top_customers_by_spend:
    label: Top customers by spend
    synonyms: [Best customers, High-value customers, Reward-eligible customers]
    description: >
      Customers ranked by total spend in a given period. Used by the
      rewards_report stored procedure to identify candidates for loyalty rewards.
    calculation: SUM(amount) FROM payment GROUP BY customer_id ORDER BY 
      SUM(amount) DESC

  replacement_cost:
    label: Film Replacement Cost
    synonyms:
    - most expensive to replace
    - priciest film
    - highest replacement cost per film
    - expensive films
    - cost to replace
    - replacement cost
    description: >
      The replacement cost of an individual film. Use for ranking or listing
      questions like "top 10 most expensive films". Not an aggregate.
    calculation: film.replacement_cost

  max_replacement_cost:
    label: Maximum Replacement Cost
    synonyms:
    - maximum replacement cost overall
    - what is the highest replacement cost
    - peak replacement cost
    description: >
      Aggregate metric returning a single scalar value. Use only for questions
      like "what is the highest replacement cost across all films".
    calculation: MAX(film.replacement_cost)

