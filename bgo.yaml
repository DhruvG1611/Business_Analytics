ontology:
  entities:
    departments:
      description: An organisational unit within the company grouping employees and
        projects.
      synonyms:
      - department
      - org unit
      - team
      - section
      - division
      - group
    employees:
      description: An individual who works for the company, belongs to a department,
        and is assigned tasks.
      synonyms:
      - employee
      - staff member
      - personnel
      - worker
      - associate
      - team member
      - person
      - individual
    skills:
      description: A technical or professional capability that employees can possess
        at varying proficiency levels.
      synonyms:
      - skill
      - capability
      - competency
      - expertise
      - technology
      - tool
      - ability
    projects:
      description: A scoped body of work owned by a department, containing many tasks.
      synonyms:
      - project
      - initiative
      - programme
      - workstream
      - engagement
    tasks:
      description: A unit of work within a project, assigned to an employee, with
        a status lifecycle.
      synonyms:
      - task
      - ticket
      - item
      - work item
      - action item
      - job
      - assignment
      - deliverable
    task_logs:
      description: An audit/activity log entry recording an event on a task.
      synonyms:
      - task log
      - log entry
      - activity log
      - audit log
      - event log
      - history entry
  relationships:
  - statement: A department has many employees.
    from: departments
    to: employees
    cardinality: one_to_many
    natural_language:
    - a department typically has multiple employees
    - employees belong to a department
  - statement: An employee belongs to one department.
    from: employees
    to: departments
    cardinality: many_to_one
    natural_language:
    - an employee is usually assigned to one department
  - statement: An employee can have many skills at varying proficiency levels.
    from: employees
    to: employee_skills
    cardinality: one_to_many
    natural_language:
    - employees hold multiple skills
    - a person can know many technologies
  - statement: A skill can be held by many employees.
    from: skills
    to: employee_skills
    cardinality: one_to_many
    natural_language:
    - many employees can share the same skill
    - a technology can be known by multiple people
  - statement: A department owns many projects.
    from: departments
    to: projects
    cardinality: one_to_many
    natural_language:
    - projects are owned by departments
    - a department runs multiple projects
  - statement: A project has many tasks.
    from: projects
    to: tasks
    cardinality: one_to_many
    natural_language:
    - a project contains many tasks
    - tasks belong to a project
  - statement: An employee is assigned many tasks.
    from: employees
    to: tasks
    cardinality: one_to_many
    natural_language:
    - an employee can be assigned multiple tasks
    - tasks are assigned to employees
  - statement: A task has many log entries.
    from: tasks
    to: task_logs
    cardinality: one_to_many
    natural_language:
    - every status change generates a log entry
    - task history is captured in task_logs
