metrics:
  # ════════════════════════════════════════════════════════
  # ROW COUNT METRICS  (Easy E1–E10, E15)
  # ════════════════════════════════════════════════════════

  actor_row_count:
    compute: COUNT(*)
    sources: [actor]
    label: Total Actors
    covers: [E10]

  address_row_count:
    compute: COUNT(*)
    sources: [address]
    label: Total Addresses

  category_row_count:
    compute: COUNT(*)
    sources: [category]
    label: Total Categories
    covers: [E5]

  city_row_count:
    compute: COUNT(*)
    sources: [city]
    label: Total Cities

  country_row_count:
    compute: COUNT(*)
    sources: [country]
    label: Total Countries

  customer_row_count:
    compute: COUNT(*)
    sources: [customer]
    label: Total Customers

  active_customer_count:
    compute: COUNT(*)
    compute_where: customer.active = 1
    sources: [customer]
    label: Active Customers
    covers: [E2]

  film_row_count:
    compute: COUNT(*)
    sources: [film]
    label: Total Films
    covers: [E1]

  inventory_row_count:
    compute: COUNT(*)
    sources: [inventory]
    label: Total Inventory Copies
    covers: [E7]

  language_row_count:
    compute: COUNT(*)
    sources: [language]
    label: Total Languages
    covers: [E6]

  payment_row_count:
    compute: COUNT(*)
    sources: [payment]
    label: Total Payments
    covers: [E9]

  rental_row_count:
    compute: COUNT(*)
    sources: [rental]
    label: Total Rentals
    covers: [E8]

  active_rental_count:
    compute: COUNT(*)
    compute_where: rental.return_date IS NULL
    sources: [rental]
    label: Open / Active Rentals
    covers: [E15]

  staff_row_count:
    compute: COUNT(*)
    sources: [staff]
    label: Total Staff

  active_staff_count:
    compute: COUNT(*)
    compute_where: staff.active = 1
    sources: [staff]
    label: Active Staff
    covers: [E4]

  # ════════════════════════════════════════════════════════
  # RENTAL STATUS METRICS  (Medium M9, M14; Hard H1, H5)
  # ════════════════════════════════════════════════════════

  never_rented_film_count:
    compute: COUNT(DISTINCT film.film_id)
    compute_where: film.film_id NOT IN (SELECT DISTINCT i.film_id FROM inventory i JOIN rental r ON r.inventory_id = i.inventory_id)
    sources: [film]
    label: Films Never Rented
    covers: [M9]
    notes: >
      Anti-join: films with no inventory copy that ever appears in the rental table.
      Returns film_id + title for listing; count for summary.

  currently_rented_films:
    compute: COUNT(DISTINCT inventory.film_id)
    compute_where: rental.return_date IS NULL
    sources: [rental, inventory, film]
    label: Distinct Films Currently Rented Out
    join_path: [rental, inventory, film]
    covers: [M14]
    notes: >
      Group by film.film_id + film.title + customer to list which titles
      are out and who has them.

  overdue_rental_count:
    compute: COUNT(DISTINCT rental.rental_id)
    compute_where: >
      rental.return_date IS NULL
      AND DATE_ADD(rental.rental_date, INTERVAL film.rental_duration DAY) < CURRENT_DATE()
    sources: [rental, inventory, film]
    label: Overdue Rentals
    join_path: [rental, inventory, film]
    covers: [H1]

  overdue_rentals_detail:
    compute: COUNT(DISTINCT rental.rental_id)
    compute_where: >
      rental.return_date IS NULL
      AND DATE_ADD(rental.rental_date, INTERVAL film.rental_duration DAY) < CURRENT_DATE()
    sources: [rental, inventory, film, customer]
    label: Overdue Rentals (with Customer & Film Detail)
    join_path: [rental, inventory, film, rental_to_customer, customer]
    group_by:
      [
        customer.customer_id,
        customer.first_name,
        customer.last_name,
        film.title,
        rental.rental_date,
        film.rental_duration,
      ]
    covers: [H1]
    notes: >
      Use DATEDIFF(CURRENT_DATE(), DATE_ADD(rental.rental_date, INTERVAL film.rental_duration DAY))
      as days_overdue column.

  unpaid_rental_count:
    compute: COUNT(DISTINCT rental.rental_id)
    compute_where: rental.rental_id NOT IN (SELECT rental_id FROM payment WHERE rental_id IS NOT NULL)
    sources: [rental, customer]
    label: Rentals Without a Payment (Unpaid)
    join_path: [rental, customer]
    covers: [H5-summary]

  outstanding_balance_by_customer:
    compute: COUNT(DISTINCT rental.rental_id)
    compute_where: rental.rental_id NOT IN (SELECT rental_id FROM payment WHERE rental_id IS NOT NULL)
    sources: [rental, customer]
    label: Unpaid Rental Count per Customer
    join_path: [rental, customer]
    group_by:
      [
        customer.customer_id,
        customer.first_name,
        customer.last_name,
        customer.store_id,
        rental.return_date,
      ]
    covers: [H5]
    notes: >
      Multiply unpaid_count by film.rental_rate (via inventory join) for estimated amount owed.
      Split by return_date IS NULL vs IS NOT NULL to separate "open + unpaid" from "returned + unpaid".

  # ════════════════════════════════════════════════════════
  # REVENUE METRICS  (Easy E11; Medium M1–M5, M11, M13, M17; Hard H2, H3, H6, H7, H10)
  # ════════════════════════════════════════════════════════

  total_revenue:
    compute: SUM(payment.amount)
    sources: [payment]
    label: Total Revenue
    covers: [E11]

  average_payment_amount:
    compute: AVG(payment.amount)
    sources: [payment]
    label: Average Payment Amount

  revenue_by_store:
    compute: SUM(payment.amount)
    sources: [payment, rental, inventory, store]
    label: Revenue by Store
    join_path: [payment, rental, inventory, store]
    group_by: [inventory.store_id]
    covers: [M1]

  revenue_by_category:
    compute: SUM(payment.amount)
    sources: [payment, rental, inventory, film, film_category, category]
    label: Revenue by Film Category
    join_path: [payment, rental, inventory, film, film_category, category]
    group_by: [category.category_id, category.name]
    covers: [M3]

  revenue_by_film:
    compute: SUM(payment.amount)
    sources: [payment, rental, inventory, film]
    label: Revenue by Film
    join_path: [payment, rental, inventory, film]
    group_by: [film.film_id, film.title]

  revenue_by_customer:
    compute: SUM(payment.amount)
    sources: [payment, customer, address, city, country]
    label: Revenue by Customer (CLV)
    join_path: [payment, customer, address, city, country]
    group_by: [customer.customer_id, customer.first_name, customer.last_name]
    covers: [M4, H2]
    description: Total spend per customer partitioned by geography

  revenue_by_staff:
    compute: SUM(payment.amount)
    sources: [payment, staff]
    label: Revenue Processed by Staff Member
    join_path: [payment, staff]
    group_by: [staff.staff_id, staff.first_name, staff.last_name]
    covers: [M11]

  revenue_by_month:
    compute: SUM(payment.amount)
    compute_group: YEAR(payment.payment_date), MONTH(payment.payment_date)
    sources: [payment]
    label: Monthly Revenue
    group_by: [YEAR(payment.payment_date), MONTH(payment.payment_date)]
    covers: [M5]

  revenue_by_rating:
    compute: SUM(payment.amount)
    sources: [payment, rental, inventory, film]
    label: Revenue by Film Rating
    join_path: [payment, rental, inventory, film]
    group_by: [film.rating]
    covers: [H10]

  revenue_per_inventory_copy:
    compute: SUM(payment.amount) / COUNT(DISTINCT inventory.inventory_id)
    sources: [payment, rental, inventory, film]
    label: Revenue per Inventory Copy (Efficiency)
    join_path: [payment, rental, inventory, film]
    group_by: [film.film_id, film.title]
    covers: [H3]
    notes: >
      Numerator: total payments for each film_id via rental→inventory.
      Denominator: total distinct inventory copies for that film_id.
      Rank DESC to find most efficient titles.

  revenue_density_per_store:
    compute: SUM(payment.amount) / COUNT(DISTINCT inventory.inventory_id)
    sources: [payment, rental, inventory, store]
    label: Revenue per Inventory Copy by Store
    join_path: [payment, rental, inventory, store]
    group_by: [inventory.store_id]
    covers: [H7]

  average_payment_per_rental_by_category:
    compute: AVG(payment.amount)
    sources: [payment, rental, inventory, film, film_category, category]
    label: Average Payment per Rental by Film Category
    join_path: [payment, rental, inventory, film, film_category, category]
    group_by: [category.category_id, category.name]
    covers: [H13]

  # ════════════════════════════════════════════════════════
  # FILM METRICS  (Easy E12–E13; Medium M13, M17, M20)
  # ════════════════════════════════════════════════════════

  films_per_category:
    compute: COUNT(DISTINCT film_category.film_id)
    sources: [film_category, category]
    label: Films per Category
    join_path: [film_category, category]
    group_by: [category.category_id, category.name]
    covers: [E14]

  films_per_actor:
    compute: COUNT(DISTINCT film_actor.film_id)
    sources: [film_actor, actor]
    label: Films per Actor
    join_path: [film_actor, actor]
    group_by: [actor.actor_id, actor.first_name, actor.last_name]
    covers: [M6]

  films_per_language:
    compute: COUNT(DISTINCT film.film_id)
    sources: [film, language]
    label: Films per Language
    join_path: [film, language]
    group_by: [language.language_id, language.name]

  films_per_rating:
    compute: COUNT(DISTINCT film.film_id)
    sources: [film]
    label: Films per Rating
    group_by: [film.rating]
    covers: [E13]

  average_rental_rate:
    compute: AVG(film.rental_rate)
    sources: [film]
    label: Average Rental Rate
    covers: [E12]

  average_film_length:
    compute: AVG(film.length)
    sources: [film]
    label: Average Film Length (Minutes)

  average_replacement_cost:
    compute: AVG(film.replacement_cost)
    sources: [film]
    label: Average Replacement Cost (all films)

  average_replacement_cost_by_rating:
    compute: AVG(film.replacement_cost)
    sources: [film]
    label: Average Replacement Cost by Rating
    group_by: [film.rating]
    covers: [M13]

  max_replacement_cost:
    compute: MAX(film.replacement_cost)
    sources: [film]
    label: Maximum Replacement Cost
    covers: [M17]
    notes: >
      To return the film title, use:
      SELECT title, replacement_cost FROM film ORDER BY replacement_cost DESC LIMIT 1

  films_above_length_threshold:
    compute: COUNT(DISTINCT film.film_id)
    compute_where: film.length > 120
    sources: [film]
    label: Films Longer Than 2 Hours
    group_by:
      [film.film_id, film.title, film.length, film.rental_rate, film.rating]
    covers: [M20]
    notes: >
      Threshold is parameterised; default 120 minutes (2 hours).
      Returns listing rows, not just a count — project title, length, rental_rate, rating.

  rank_films_within_category:
    compute: RANK() OVER (PARTITION BY category.category_id ORDER BY COUNT(DISTINCT rental.rental_id) DESC)
    sources: [rental, inventory, film, film_category, category]
    label: Rental Rank of Film Within Its Category
    join_path: [rental, inventory, film, film_category, category]
    group_by: [category.category_id, category.name, film.film_id, film.title]
    covers: [H6]
    notes: >
      Outer query filters WHERE film_rank <= 3 to return top-3 per category.
      Also compute SUM(payment.amount) per group for the revenue dimension of H6.

  # ════════════════════════════════════════════════════════
  # ACTOR METRICS  (Hard H9)
  # ════════════════════════════════════════════════════════

  actors_per_film:
    compute: COUNT(DISTINCT film_actor.actor_id)
    sources: [film_actor, film]
    label: Actors per Film
    join_path: [film_actor, film]
    group_by: [film.film_id, film.title]

  actor_co_appearance_count:
    compute: COUNT(DISTINCT fa1.film_id)
    sources: [film_actor]
    label: Co-appearance Count Between Actor Pairs
    join_path: [film_actor_self_join]
    group_by: [fa1.actor_id, fa2.actor_id]
    covers: [H9]
    notes: >
      Self-join: film_actor fa1 JOIN film_actor fa2 ON fa1.film_id = fa2.film_id AND fa1.actor_id < fa2.actor_id
      GROUP BY fa1.actor_id, fa2.actor_id
      ORDER BY COUNT(*) DESC
      Join back to actor twice (a1, a2) for names.

  actors_never_in_action:
    compute: COUNT(DISTINCT actor.actor_id)
    compute_where: >
      actor.actor_id NOT IN (
        SELECT fa.actor_id FROM film_actor fa
        JOIN film_category fc ON fa.film_id = fc.film_id
        JOIN category c ON fc.category_id = c.category_id
        WHERE c.name = 'Action'
      )
    sources: [actor]
    label: Actors Who Never Acted in Action Movies

  actors_in_all_categories:
    compute: COUNT(DISTINCT film_category.category_id)
    sources: [actor, film_actor, film_category]
    label: Actors Working in All Categories
    join_path: [actor, film_actor, film_category]
    group_by: [actor.actor_id, actor.first_name, actor.last_name]
    compute_having: COUNT(DISTINCT film_category.category_id) = (SELECT COUNT(category_id) FROM category)

  # ════════════════════════════════════════════════════════
  # RENTAL METRICS  (Medium M2, M7, M10, M16, M19; Hard H4, H11, H12, H15)
  # ════════════════════════════════════════════════════════

  rentals_per_customer:
    compute: COUNT(DISTINCT rental.rental_id)
    sources: [rental, customer]
    label: Rentals per Customer
    join_path: [rental, customer]
    group_by: [customer.customer_id, customer.first_name, customer.last_name]
    compute_having: COUNT(DISTINCT rental.rental_id) > 30
    covers: [M10]
    notes: >
      Remove compute_having for full listing. Add it back (threshold parameterisable)
      to answer "customers who rented more than N films".

  rentals_per_film:
    compute: COUNT(DISTINCT rental.rental_id)
    sources: [rental, inventory, film]
    label: Rentals per Film
    join_path: [rental, inventory, film]
    group_by: [film.film_id, film.title]
    covers: [M2]

  rentals_per_store:
    compute: COUNT(DISTINCT rental.rental_id)
    sources: [rental, inventory, store]
    label: Rentals per Store
    join_path: [rental, inventory, store]
    group_by: [inventory.store_id]

  rentals_per_store_per_month:
    compute: COUNT(DISTINCT rental.rental_id)
    sources: [rental, inventory, store]
    label: Rentals per Store per Month
    join_path: [rental, inventory, store]
    group_by:
      [inventory.store_id, YEAR(rental.rental_date), MONTH(rental.rental_date)]
    covers: [M16]

  rentals_by_month:
    compute: COUNT(DISTINCT rental.rental_id)
    compute_group: YEAR(rental.rental_date), MONTH(rental.rental_date)
    sources: [rental]
    label: Rentals by Month
    group_by: [YEAR(rental.rental_date), MONTH(rental.rental_date)]

  rentals_by_category_and_country:
    compute: COUNT(DISTINCT rental.rental_id)
    sources:
      [
        rental,
        inventory,
        film,
        film_category,
        category,
        customer,
        address,
        city,
        country,
      ]
    label: Rentals by Category and Country
    join_path:
      [
        rental,
        inventory,
        film,
        film_category,
        category,
        customer,
        address,
        city,
        country,
      ]
    group_by:
      [country.country_id, country.country, category.category_id, category.name]

  rentals_per_staff:
    compute: COUNT(DISTINCT rental.rental_id)
    sources: [rental, staff]
    label: Rentals Processed per Staff Member
    join_path: [rental, staff]
    group_by: [staff.staff_id, staff.first_name, staff.last_name]
    covers: [M19]

  rentals_per_category:
    compute: COUNT(DISTINCT rental.rental_id)
    sources: [rental, inventory, film, film_category, category]
    label: Rentals per Category
    join_path: [rental, inventory, film, film_category, category]
    group_by: [category.category_id, category.name]

  average_rental_duration_days:
    compute: AVG(DATEDIFF(rental.return_date, rental.rental_date))
    compute_where: rental.return_date IS NOT NULL
    sources: [rental]
    label: Average Rental Duration (Days)
    covers: [M7]

  avg_rental_duration_per_category:
    compute: AVG(DATEDIFF(rental.return_date, rental.rental_date))
    sources: [rental, inventory, film, film_category, category]
    label: Average Rental Duration per Category
    join_path: [rental, inventory, film, film_category, category]
    group_by: [category.category_id, category.name]

  repeat_rental_rate:
    compute: COUNT(DISTINCT rental.customer_id)
    compute_where: >
      rental.customer_id IN (
        SELECT r2.customer_id
        FROM rental r2
        JOIN inventory i2 ON r2.inventory_id = i2.inventory_id
        GROUP BY r2.customer_id, i2.store_id, YEAR(r2.rental_date), MONTH(r2.rental_date)
        HAVING COUNT(*) > 1
      )
    sources: [rental, inventory, customer]
    label: Customers with Repeat Rentals at Same Store in a Month
    join_path: [rental, inventory, customer]
    covers: [H4]
    notes: >
      For rate: divide by active_customer_count.
      For monthly trend: add YEAR/MONTH grouping to the outer query.

  customer_rental_tenure_days:
    compute: DATEDIFF(MAX(rental.rental_date), MIN(rental.rental_date))
    sources: [rental, customer]
    label: Days Between First and Latest Rental per Customer
    join_path: [rental, customer]
    group_by: [customer.customer_id, customer.first_name, customer.last_name]
    covers: [H11]
    notes: >
      Also surface MIN(rental.rental_date) AS first_rental and MAX(rental.rental_date) AS last_rental
      as companion columns.

  rentals_per_inventory_item:
    compute: COUNT(DISTINCT rental.rental_id)
    sources: [rental, inventory, film]
    label: Total Rentals per Inventory Copy
    join_path: [rental, inventory, film]
    group_by:
      [inventory.inventory_id, film.film_id, film.title, inventory.store_id]
    covers: [H12]
    notes: >
      Add a derived column:
        CASE WHEN EXISTS (SELECT 1 FROM rental r2 WHERE r2.inventory_id = inventory.inventory_id AND r2.return_date IS NULL)
             THEN 'rented_out' ELSE 'in_stock' END AS current_status

  loyalty_eligible_customers:
    compute: COUNT(DISTINCT customer.customer_id)
    compute_where: >
      rental.rental_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
    sources: [rental, payment, customer]
    label: Loyalty-Eligible Customers (7+ rentals, $20+ spend, last 30 days)
    join_path: [rental, payment, customer]
    group_by:
      [
        customer.customer_id,
        customer.first_name,
        customer.last_name,
        customer.email,
      ]
    compute_having: COUNT(DISTINCT rental.rental_id) >= 7 AND SUM(payment.amount) >= 20.00
    covers: [H15]
    notes: >
      Thresholds are parameterisable: min_rentals (default 7), min_spend (default 20.00).
      Corresponds to the rewards_report stored procedure logic in Sakila.

  films_rented_by_all_customers:
    compute: COUNT(DISTINCT rental.rental_id)
    sources: [film, inventory, rental]
    label: Films Rented by All Customers
    join_path: [film, inventory, rental]
    group_by: [film.film_id, film.title]
    compute_having: COUNT(DISTINCT rental.customer_id) = (SELECT COUNT(customer_id) FROM customer)

  # ════════════════════════════════════════════════════════
  # INVENTORY METRICS  (Medium M8, M15; Hard H14)
  # ════════════════════════════════════════════════════════

  copies_per_film:
    compute: COUNT(DISTINCT inventory.inventory_id)
    sources: [inventory, film]
    label: Copies per Film (all stores)
    join_path: [inventory, film]
    group_by: [film.film_id, film.title]

  copies_per_film_per_store:
    compute: COUNT(DISTINCT inventory.inventory_id)
    sources: [inventory, film, store]
    label: Copies per Film per Store
    join_path: [inventory, film, store]
    group_by: [film.film_id, film.title, inventory.store_id]
    covers: [M8]

  inventory_per_store:
    compute: COUNT(DISTINCT inventory.inventory_id)
    sources: [inventory, store]
    label: Total Inventory per Store
    join_path: [inventory, store]
    group_by: [inventory.store_id]

  inventory_in_stock_pct:
    compute: >
      SUM(CASE WHEN inventory_in_stock(inventory.inventory_id) = 1 THEN 1 ELSE 0 END)
      / COUNT(DISTINCT inventory.inventory_id) * 100
    sources: [inventory, store]
    label: Percentage of Inventory Currently In Stock by Store
    join_path: [inventory, store]
    group_by: [inventory.store_id]
    covers: [M15]
    notes: >
      Uses the inventory_in_stock() stored function.
      Alternative without the function:
        SUM(CASE WHEN NOT EXISTS (SELECT 1 FROM rental r WHERE r.inventory_id = inventory.inventory_id AND r.return_date IS NULL) THEN 1 ELSE 0 END)
        / COUNT(*) * 100

  inventory_turnover_rate:
    compute: COUNT(DISTINCT rental.rental_id) / COUNT(DISTINCT inventory.inventory_id)
    sources: [rental, inventory, store]
    label: Inventory Turnover Rate (Rentals per Copy per Month)
    join_path: [rental, inventory, store]
    group_by:
      [inventory.store_id, YEAR(rental.rental_date), MONTH(rental.rental_date)]
    covers: [H14]
    notes: >
      Numerator: total rentals processed at the store in the month.
      Denominator: total inventory copies stocked at the store.
      Compare across stores to identify higher throughput location.

  # ════════════════════════════════════════════════════════
  # CUSTOMER METRICS  (Medium M12, M18; Hard H8, H15)
  # ════════════════════════════════════════════════════════

  customers_per_store:
    compute: COUNT(DISTINCT customer.customer_id)
    sources: [customer, store]
    label: Customers per Store
    join_path: [customer, store]
    group_by: [customer.store_id]

  active_customers_per_store:
    compute: COUNT(DISTINCT customer.customer_id)
    compute_where: customer.active = 1
    sources: [customer, store]
    label: Active Customers per Store
    join_path: [customer, store]
    group_by: [customer.store_id]
    covers: [M18-active]

  inactive_customers_per_store:
    compute: COUNT(DISTINCT customer.customer_id)
    compute_where: customer.active = 0
    sources: [customer, store]
    label: Inactive Customers per Store
    join_path: [customer, store]
    group_by: [customer.store_id]
    covers: [M18-inactive]

  customers_per_country:
    compute: COUNT(DISTINCT customer.customer_id)
    sources: [customer, address, city, country]
    label: Customers per Country
    join_path: [customer, address, city, country]
    group_by: [country.country_id, country.country]
    covers: [M12]

  customers_per_city:
    compute: COUNT(DISTINCT customer.customer_id)
    sources: [customer, address, city]
    label: Customers per City
    join_path: [customer, address, city]
    group_by: [city.city_id, city.city]

  customer_churn_rate:
    compute: >
      COUNT(DISTINCT prev_month.customer_id) - COUNT(DISTINCT curr_month.customer_id)
      / COUNT(DISTINCT prev_month.customer_id) * 100
    sources: [rental, customer]
    label: Customer Churn Rate (Month-over-Month)
    join_path: [rental, customer]
    covers: [H8]
    notes: >
      CTE approach:
        prev_month AS (SELECT DISTINCT customer_id FROM rental
                       WHERE rental_date BETWEEN DATE_SUB(LAST_DAY(DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)), INTERVAL DAY(LAST_DAY(DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)))-1 DAY)
                                             AND LAST_DAY(DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH))),
        curr_month AS (SELECT DISTINCT customer_id FROM rental
                       WHERE rental_date BETWEEN DATE_SUB(CURRENT_DATE(), INTERVAL DAY(CURRENT_DATE())-1 DAY)
                                             AND CURRENT_DATE())
        SELECT COUNT(p.customer_id) AS churned,
               COUNT(p.customer_id) / COUNT(*) * 100 AS churn_pct
        FROM prev_month p LEFT JOIN curr_month c ON p.customer_id = c.customer_id
        WHERE c.customer_id IS NULL

  customers_with_no_rentals:
    compute: COUNT(DISTINCT customer.customer_id)
    compute_where: customer.customer_id NOT IN (SELECT customer_id FROM rental)
    sources: [customer]
    label: Customers With No Rentals

  customers_above_avg_spend:
    compute: SUM(payment.amount)
    sources: [payment, customer]
    label: Customers Spending Above Average
    join_path: [payment, customer]
    group_by: [customer.customer_id, customer.first_name, customer.last_name]
    compute_having: >
      SUM(payment.amount) > (
        SELECT AVG(customer_total) FROM (
          SELECT SUM(amount) AS customer_total FROM payment GROUP BY customer_id
        ) AS avg_query
      )

  customers_rented_all_categories:
    compute: COUNT(DISTINCT rental.rental_id)
    sources: [customer, rental, inventory, film_category]
    label: Customers Who Rented From All Categories
    join_path: [customer, rental, inventory, film_category]
    group_by: [customer.customer_id, customer.first_name, customer.last_name]
    compute_having: COUNT(DISTINCT film_category.category_id) = (SELECT COUNT(category_id) FROM category)

  # ════════════════════════════════════════════════════════
  # STAFF METRICS
  # ════════════════════════════════════════════════════════

  payments_processed_per_staff:
    compute: COUNT(DISTINCT payment.payment_id)
    sources: [payment, staff]
    label: Payments Processed per Staff Member
    join_path: [payment, staff]
    group_by: [staff.staff_id, staff.first_name, staff.last_name]

