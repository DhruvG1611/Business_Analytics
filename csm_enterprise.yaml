# RELATIONSHIPS
# ════════════════════════════════════════════════════════════

relationships:
  film_actor_to_actor:
    from: film_actor
    to: actor
    join: film_actor.actor_id = actor.actor_id

  film_actor_to_film:
    from: film_actor
    to: film
    join: film_actor.film_id = film.film_id

  film_actor_self_join:
    from: film_actor
    to: film_actor
    alias_left: fa1
    alias_right: fa2
    join: fa1.film_id = fa2.film_id AND fa1.actor_id < fa2.actor_id
    notes: >
      Use actor joined twice (a1, a2) to retrieve names for both actors in the pair.
      fa1.actor_id < fa2.actor_id prevents duplicate pairs (A,B) and (B,A).

  film_category_to_film:
    from: film_category
    to: film
    join: film_category.film_id = film.film_id

  film_category_to_category:
    from: film_category
    to: category
    join: film_category.category_id = category.category_id

  film_to_language:
    from: film
    to: language
    join: film.language_id = language.language_id

  film_to_original_language:
    from: film
    to: language
    join: film.original_language_id = language.language_id
    notes: Only populated for dubbed films; original_language_id may be NULL.

  film_text_to_film:
    from: film_text
    to: film
    join: film_text.film_id = film.film_id

  inventory_to_film:
    from: inventory
    to: film
    join: inventory.film_id = film.film_id

  inventory_to_store:
    from: inventory
    to: store
    join: inventory.store_id = store.store_id

  rental_to_inventory:
    from: rental
    to: inventory
    join: rental.inventory_id = inventory.inventory_id

  rental_to_customer:
    from: rental
    to: customer
    join: rental.customer_id = customer.customer_id

  rental_to_staff:
    from: rental
    to: staff
    join: rental.staff_id = staff.staff_id

  payment_to_customer:
    from: payment
    to: customer
    join: payment.customer_id = customer.customer_id

  payment_to_staff:
    from: payment
    to: staff
    join: payment.staff_id = staff.staff_id

  payment_to_rental:
    from: payment
    to: rental
    join: payment.rental_id = rental.rental_id
    notes: >
      Always add AND payment.rental_id IS NOT NULL when joining payment to rental
      to exclude balance-settlement payments not tied to a specific rental.

  customer_to_store:
    from: customer
    to: store
    join: customer.store_id = store.store_id

  customer_to_address:
    from: customer
    to: address
    join: customer.address_id = address.address_id

  staff_to_store:
    from: staff
    to: store
    join: staff.store_id = store.store_id

  staff_to_address:
    from: staff
    to: address
    join: staff.address_id = address.address_id

  store_to_manager:
    from: store
    to: staff
    join: store.manager_staff_id = staff.staff_id

  store_to_address:
    from: store
    to: address
    join: store.address_id = address.address_id

  address_to_city:
    from: address
    to: city
    join: address.city_id = city.city_id

  city_to_country:
    from: city
    to: country
    join: city.country_id = country.country_id

# ════════════════════════════════════════════════════════════
# INTENT PATTERNS
# ════════════════════════════════════════════════════════════
#
# Purpose: teach the RAG retriever the correct metric + partition_by/group_by
# for ranked / windowed / top-N / grouped queries. Without these, the
# SQL generator falls back to guessing and picks wrong PARTITION BY columns.
#
# Rules for adding new patterns:
#   1. metric must match a key in the metrics section above.
#   2. partition_by must be a dimension key — never a name column
#      (customer_first_name, customer_last_name, actor_first_name, etc.).
#   3. group_by lists all columns that appear in SELECT + GROUP BY.
#   4. filter is the WHERE/HAVING applied AFTER the window (usually rnk = 1
#      for "top 1 per group", rnk <= 3 for "top 3", etc.).
#   5. Add at least 2–3 natural-language variants per logical query shape
#      so the embedding model can find the pattern under different phrasings.
# ════════════════════════════════════════════════════════════════════════════

intent_patterns:
  # ──────────────────────────────────────────────────────────────────────────
  # CORE 16 EXERCISES (LEVEL 1 TO LEVEL 4)
  # ──────────────────────────────────────────────────────────────────────────

  - id: level1_q1_top_rented_films
    pattern: Which films have been rented the most? Show top 10.
    metric: rentals_per_film
    dimensions:
      - film_film_id
      - film_title
    window:
      function: RANK
      partition_by: _none_
      order_by: rentals_per_film DESC
    filter: rnk <= 10

  - id: level1_q2_revenue_per_category
    pattern: What is the total revenue generated by each film category?
    metric: revenue_by_category
    dimensions:
      - category_name
      - payment_amount
    window:
      function: _none_
      partition_by: _none_
      order_by: revenue_by_category DESC
    filter: _none_

  - id: level1_q3_top_customers_spending
    pattern: Who are the top 5 customers by total spending?
    metric: revenue_by_customer
    dimensions:
      - customer_customer_id
      - customer_first_name
      - customer_last_name
      - payment_amount
    window:
      function: RANK
      partition_by: _none_
      order_by: revenue_by_customer DESC
    filter: rnk <= 5

  - id: level1_q4_rentals_per_month
    pattern: How many rentals were made each month?
    metric: rentals_by_month
    dimensions:
      - rental_rental_month
    window:
      function: _none_
      partition_by: _none_
      order_by: _none_
    filter: _none_

  - id: level2_q5_actors_in_most_films
    pattern: Which actors have appeared in the most films?
    metric: films_per_actor
    dimensions:
      - actor_actor_id
      - actor_first_name
      - actor_last_name
    window:
      function: RANK
      partition_by: _none_
      order_by: films_per_actor DESC
    filter: rnk = 1

  - id: level2_q6_films_never_rented
    pattern: List all films that have never been rented.
    metric: never_rented_film_count
    dimensions:
      - film_film_id
